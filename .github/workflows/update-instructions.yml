name: Update Instructions

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  update-instructions:
    if: contains(github.event.comment.body, '/instructions') && (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            以下のコマンドでこのPRの全コメントを取得してください：
            gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments

            取得したコメント一覧の中から、`/instructions` というコメント（コメントID: ${{ github.event.comment.id }}）の直前のコメントを「AIへの指摘内容」として使用してください。

            その指摘を読み取り、以下の手順を実行してください：
            1. `base.instructions.md` を読む（存在しない場合は新規作成）
            2. 指摘内容をAIへの指示として整理し、重複がなければ追記する
               - 「〜すること」「〜しないこと」の形式で簡潔に箇条書き
            3. 以下のコマンドを順番に実行してPRを作成する：
               ```bash
               git config user.name "github-actions[bot]"
               git config user.email "github-actions[bot]@users.noreply.github.com"
               git checkout -b "こんにちは/today-${{ github.run_number }}"
               git add base.instructions.md
               git commit -m "instructions: <指摘の要約>"
               git push origin "こんにちは/today-${{ github.run_number }}"
               gh pr create --title "instructions: <指摘の要約>" --body "PR #${{ github.event.issue.number }} の指摘をもとに作成" --base main
               ```
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
