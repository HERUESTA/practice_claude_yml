name: Update Instructions

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  update-instructions:
    if: |
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '/instructions')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/instructions'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            以下の手順で「AIへの指摘内容」を取得してください：

            ${{ github.event.comment.in_reply_to_id != '' && format('返信元のレビューコメント（コメントID: {0}）を取得してください：\ngh api repos/{1}/pulls/comments/{0}\nこのコメントが「AIへの指摘内容」です。', github.event.comment.in_reply_to_id, github.repository) || format('このコメント自体が「AIへの指摘内容」です：\n{0}', github.event.comment.body) }}

            その指摘を読み取り、以下の手順を実行してください：
            1. `base.instructions.md` を読む（存在しない場合は新規作成）
            2. 指摘内容をAIへの指示として整理し、重複がなければ追記する
               - 「〜すること」「〜しないこと」の形式で簡潔に箇条書き
            3. 変更をコミットし、PRを作成する
               - PRタイトル: "instructions: <指摘の要約>"
               - PRには「どの指摘をもとにしたか」をPR番号で記載する（PR #${{ github.event.issue.number || github.event.pull_request.number }}）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
