name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
  pull_request:
    branches: [develop]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          branch_prefix: "feature/"
          branch_name_template: "{{prefix}}{{entityNumber}}"

  update-instructions:
    if: |
      github.event_name == 'pull_request_review_comment' &&
      contains(github.event.comment.body, '/instructions')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            以下のコマンドで、返信元のレビューコメント（コメントID: ${{ github.event.comment.in_reply_to_id }}）を取得してください：
            gh api repos/${{ github.repository }}/pulls/comments/${{ github.event.comment.in_reply_to_id }}

            このコメントが「AIへの指摘内容」です。

            その指摘を読み取り、以下の手順を実行してください：
            1. `base.instructions.md` を読む（存在しない場合は新規作成）
            2. 指摘内容をAIへの指示として整理し、重複がなければ追記する
               - 「〜すること」「〜しないこと」の形式で簡潔に箇条書き
            3. 変更をコミットし、PRを作成する
               - PRタイトル: "instructions: <指摘の要約>"
               - PRには「どの指摘をもとにしたか」をPR番号で記載する（PR #${{ github.event.pull_request.number }}）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}